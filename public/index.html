<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hack Arizona</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="nav">
      <div class="nav__left">
        <a class="nav__brand" href="/">
          <img class="nav__logo" src="/images/Logo.png" alt="Logo" />
        </a>
      </div>

      <nav class="nav__right" aria-label="Primary">
        <a class="nav__item nav__streak" href="/streaks" title="Streaks">
          <span class="nav__streakCount" id="streakCount">0</span>
          <span class="nav__fire" id="fireIcon" aria-hidden="true">🔥</span>
          <span class="sr-only">Streaks</span>
        </a>

        <a class="nav__item" href="/coursework" title="Coursework">
          <span class="nav__icon" aria-hidden="true">📚</span>
          <span class="nav__label">Coursework</span>
        </a>

        <a class="nav__item nav__profile" href="/profile" title="Profile">
          <span class="nav__avatar" aria-hidden="true">👤</span>
          <span class="sr-only">Profile</span>
        </a>
      </nav>
    </header>

    <main class="page">
      <h1>Home</h1>
      <p>Navbar demo. Update <code>window.streakCount</code> in the console to see the fire light up.</p>
    </main>

    <script src="/navbar.js"></script>
  </body>
</html>
